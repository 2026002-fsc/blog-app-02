<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>all Blogs</title>
</head>

<body>
    <header th:replace="'blog' :: commonHeader"></header>
    <div class="search" th:replace="'blog' :: commonSearch"></div>
    <main>
        <div class="guide" th:replace="'blog' :: commonguide"></div>
        <div class="center">
            <div class="detailCenter">
                <p>　</p>
                <h2 th:text="${blog.title}">ポラーノの広場</h2>
                <p th:text="${blog.mainText}">あのイーハトーヴォのすきとおった風、夏でもそこに冷たさを持つ青いそら、うつくしい森で飾られたモリーオ市、郊外のぎらぎらひかる草の波。<br><br>
                    またそのなかでいっしょになったたくさんのひとたち、ファゼーロとロザーロ、羊飼のミーロや、顔の赤いこどもたち、地主のテーモ、山猫博士のボーガント・デストゥパーゴなど、いまこの暗い巨きな石の建物のなかで考えていると、みんなむかし風のなつかしい青い幻燈のように思われます。では、わたくしはいつかの小さなみだしをつけながら、しずかにあの年のイーハトーヴォの五月から十月までを書きつけましょう。
                </p>
            </div>
        </div>
    </main>


</body>

</html>
